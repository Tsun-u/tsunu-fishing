<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#68c8df">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>千望的怪怪釣魚日</title>
  <style>
    :root{--ink:#394959;--paper:#fff9e9;--cream:#f7e9c9;--line:#d9b97a;--sky:#79d4e8;--water:#4dbbd2;--deep:#2389aa;--green:#75ba72;--yellow:#ffd66f;--coral:#f17c62;--shadow:0 6px 0 rgba(79,75,55,.18),0 10px 26px rgba(46,95,111,.16)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:#b8e8ef;color:var(--ink);font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;overscroll-behavior:none}
    button{font:inherit;color:inherit;touch-action:manipulation}
    button:focus-visible{outline:4px solid #fff;box-shadow:0 0 0 7px #337b95}
    .app{position:relative;width:min(100%,560px);min-height:100svh;margin:auto;overflow:hidden;background:linear-gradient(#7bd4e9 0 29%,#e9f6ce 29% 100%);box-shadow:0 0 60px rgba(30,91,107,.25)}
    .topbar{position:absolute;z-index:30;left:0;right:0;top:0;display:flex;align-items:center;gap:8px;padding:max(10px,env(safe-area-inset-top)) 12px 8px;pointer-events:none}
    .brand{margin-right:auto;color:white;text-shadow:0 2px 0 #2e91ad;font-weight:1000;letter-spacing:.06em;font-size:15px}.brand small{display:block;font-size:10px;letter-spacing:.15em;opacity:.9}
    .pill,.icon-btn{pointer-events:auto;border:2px solid rgba(118,83,36,.35);background:#fff8df;border-radius:999px;box-shadow:0 4px 0 rgba(83,97,72,.18);font-weight:1000}
    .pill{display:flex;align-items:center;gap:5px;padding:7px 11px}.coin{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;background:#ffd34f;border:2px solid #d79529;color:#aa651d;font-size:12px}.icon-btn{width:40px;height:40px;font-size:19px}
    .screen{display:none;min-height:100svh;padding-bottom:88px}.screen.active{display:block}
    #fishScreen{position:relative;padding-bottom:0;overflow:hidden}
    .world{position:relative;height:calc(100svh - 72px);min-height:540px;max-height:760px;overflow:hidden;background:linear-gradient(#75d1e7 0 34%,#cce4a9 34% 43%,#55bdd4 43% 84%,#e8ce91 84%)}
    .cloud{position:absolute;width:70px;height:20px;border-radius:999px;background:rgba(255,255,255,.8);top:95px;left:8%;animation:drift 14s ease-in-out infinite alternate}.cloud:before,.cloud:after{content:"";position:absolute;background:inherit;border-radius:50%;width:28px;height:28px;left:13px;bottom:0}.cloud:after{width:38px;height:38px;left:31px}.cloud.c2{left:auto;right:4%;top:145px;transform:scale(.72);animation-delay:-7s}
    .hills{position:absolute;top:29%;left:-10%;width:120%;height:18%;background:#8dc88b;clip-path:polygon(0 100%,0 70%,10% 30%,18% 70%,30% 10%,42% 75%,54% 38%,64% 70%,78% 8%,90% 62%,100% 25%,100% 100%)}
    .shore{position:absolute;left:0;right:0;bottom:13%;height:17%;background:#ecd49b;clip-path:polygon(0 45%,18% 55%,34% 31%,50% 44%,69% 18%,85% 31%,100% 16%,100% 100%,0 100%)}
    .pond{position:absolute;left:-10%;right:-10%;top:42%;bottom:12%;overflow:hidden;background:linear-gradient(#5dc4d8,#3aa8ca 70%,#2b96b8)}
    .pond:before{content:"";position:absolute;inset:0;background:repeating-radial-gradient(ellipse at 70% 40%,transparent 0 24px,rgba(255,255,255,.16) 25px 27px,transparent 28px 52px);animation:water 5s linear infinite}
    .lily{position:absolute;width:49px;height:20px;border-radius:50%;background:#78b86e;border:3px solid rgba(55,123,81,.3);top:56%;left:7%;transform:rotate(-8deg)}
    .lily:after{content:"✿";position:absolute;color:#fff3a8;font-size:20px;left:17px;top:-12px}
    .spot-sign{position:absolute;z-index:3;top:91px;left:15px;padding:9px 14px;border:3px solid #9c6c3c;border-radius:8px;background:#c99052;color:#fff8de;font-weight:1000;transform:rotate(-2deg);box-shadow:0 4px 0 rgba(91,75,49,.2);text-shadow:0 2px #8a6339}
    .fisher{position:absolute;z-index:4;left:17px;bottom:63px;width:180px;height:230px;filter:drop-shadow(0 8px 3px rgba(36,83,86,.18))}
    .fisher svg{width:100%;height:100%;overflow:visible}.fisher .arm{transform-origin:115px 130px;transition:transform .35s}.fisher.cast .arm{transform:rotate(-18deg)}
    .rod-line{position:absolute;z-index:2;left:142px;bottom:203px;width:220px;height:190px;pointer-events:none}.rod{position:absolute;left:0;bottom:0;width:173px;height:8px;border-radius:8px;background:linear-gradient(#f2ca75 0 45%,#76523a 46%);transform:rotate(-42deg);transform-origin:left center;box-shadow:0 2px #4a3a31}.line{position:absolute;left:131px;top:25px;width:2px;height:125px;background:rgba(244,249,229,.8);transform:rotate(4deg);transform-origin:top}.bobber{position:absolute;z-index:5;left:284px;top:49%;width:25px;height:31px;transition:transform .2s,top .2s;filter:drop-shadow(0 3px 2px rgba(24,85,102,.35))}.bobber:before{content:"";position:absolute;left:10px;width:5px;height:12px;background:#fff}.bobber:after{content:"";position:absolute;top:9px;width:25px;height:22px;border-radius:50% 50% 45% 45%;background:linear-gradient(#f06d57 0 45%,#fff5d7 46%);border:2px solid #834e3f}.bobber.waiting{animation:bob 1.3s ease-in-out infinite}.bobber.bite{top:54%;animation:sink .25s ease-in-out infinite alternate}.bobber.hidden{opacity:0}
    .bite-burst{position:absolute;z-index:4;left:267px;top:44%;font-size:34px;font-weight:1000;color:white;text-shadow:0 3px #287f99;opacity:0;transform:scale(.5)}.bite-burst.show{animation:pop .55s both}
    .game-panel{position:absolute;z-index:10;left:12px;right:12px;bottom:14px;padding:12px;background:rgba(255,249,231,.92);border:3px solid rgba(135,103,51,.32);border-radius:23px;box-shadow:var(--shadow);backdrop-filter:blur(5px)}
    .status-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}.status-dot{width:12px;height:12px;border-radius:50%;background:#87a5aa;box-shadow:0 0 0 5px rgba(110,143,148,.14)}.status-dot.bite{background:#f06d57;box-shadow:0 0 0 6px rgba(240,109,87,.22);animation:pulse .45s infinite alternate}.status-text{font-weight:900;font-size:14px;flex:1}.streak{font-size:12px;font-weight:900;color:#a76330}
    .meter{position:relative;height:24px;border:3px solid #3c7184;border-radius:999px;background:#315e71;overflow:hidden;margin-bottom:10px}.meter-zone{position:absolute;left:39%;width:22%;height:100%;background:#9bd05f;box-shadow:inset 0 0 0 3px rgba(255,255,255,.2)}.meter-mark{position:absolute;left:5%;top:-2px;width:8px;height:24px;border-radius:5px;background:#fff7dc;border:2px solid #735d48;transform:translateX(-50%)}.meter-mark.moving{animation:meterMove 1.18s ease-in-out infinite alternate}
    .cast-btn{position:relative;width:100%;min-height:61px;border:0;border-radius:17px;background:linear-gradient(#ffdf7e,#ffc950);box-shadow:0 6px 0 #d99638,0 9px 16px rgba(87,74,44,.18);font-size:23px;font-weight:1000;letter-spacing:.08em}.cast-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #d99638}.cast-btn.bite{background:linear-gradient(#ff9074,#ee634e);color:white;box-shadow:0 6px 0 #bd473c;animation:buttonPulse .45s infinite alternate}.cast-btn:disabled{filter:saturate(.45);opacity:.8}
    .hint{text-align:center;font-size:12px;font-weight:700;color:#617079;margin:9px 0 0}
    .content-screen{padding:78px 12px 98px;background:linear-gradient(#8bd7e8 0 180px,#f7edcf 180px);min-height:100svh}
    .page-title{display:flex;align-items:end;justify-content:space-between;margin:14px 4px 18px;color:white;text-shadow:0 2px #408da1}.page-title h1{margin:0;font-size:25px}.page-title span{font-weight:900}
    .panel{background:var(--paper);border:3px solid rgba(145,104,49,.27);border-radius:22px;box-shadow:var(--shadow);padding:12px}
    .inventory-tools{display:grid;grid-template-columns:1fr auto;gap:9px;margin-bottom:12px}.sell-btn{border:0;border-radius:13px;padding:12px;background:#79ba67;color:white;font-weight:1000;box-shadow:0 4px 0 #528f4c}.sell-btn.secondary{background:#e8b95f;color:#684b23;box-shadow:0 4px 0 #c38e3c}.sell-btn:disabled{opacity:.45;filter:grayscale(.5)}
    .inventory-grid,.dex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.empty-state{grid-column:1/-1;text-align:center;padding:55px 10px;color:#7f8179;font-weight:800}.empty-state b{display:block;font-size:45px;margin-bottom:9px}
    .item-card,.dex-card{position:relative;min-width:0;border:2px solid #e1cfa7;border-radius:14px;background:#fffdf6;padding:8px 5px;text-align:center;min-height:116px;box-shadow:0 3px 0 rgba(145,111,63,.12)}.item-card{cursor:pointer}.item-card.selected{border-color:#70b46c;background:#f0fae9;box-shadow:0 0 0 3px rgba(112,180,108,.25)}.check{position:absolute;top:5px;right:5px;display:grid;place-items:center;width:20px;height:20px;border:2px solid #cbb887;border-radius:50%;background:white;font-size:12px;color:white}.selected .check{background:#70b46c;border-color:#518a4e}.fish-emoji{display:grid;place-items:center;height:58px;font-size:42px;line-height:1;filter:drop-shadow(0 4px 1px rgba(70,74,58,.12))}.fish-emoji .combo{font-size:29px;white-space:nowrap}.fish-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;font-weight:1000}.fish-meta{font-size:10px;color:#8a7b67;font-weight:700;margin-top:3px}.price-tag{position:absolute;left:5px;top:5px;font-size:9px;background:#ffe39a;border-radius:8px;padding:2px 4px;font-weight:900}
    .filter-row{display:flex;gap:6px;overflow-x:auto;margin:-3px 0 12px;padding:3px 1px 8px;scrollbar-width:none}.filter-row::-webkit-scrollbar{display:none}.filter-btn{flex:0 0 auto;border:2px solid #d8c18d;border-radius:999px;background:#fffaf0;padding:7px 11px;font-size:12px;font-weight:900}.filter-btn.active{background:#5aaec7;border-color:#438ba3;color:white}
    .dex-card.locked .fish-emoji{filter:grayscale(1) brightness(.35) opacity(.28)}.dex-card.locked .fish-name{color:#8c887f}.rarity-line{height:5px;border-radius:8px;margin:4px 5px 7px;background:var(--rarity,#aaa)}.new-badge{position:absolute;right:-4px;top:-5px;background:#ef6957;color:white;border:2px solid white;border-radius:999px;padding:2px 6px;font-size:9px;font-weight:1000;animation:pulse .8s infinite alternate}
    .fish-sprite{display:block;width:100%;height:100%;background-image:url('assets/weird_fish_atlas.webp');background-repeat:no-repeat;background-size:500% 200%;background-position:var(--fish-x) var(--fish-y)}
    .fish-emoji{height:64px}.fish-emoji .fish-sprite{width:72px;height:72px}.catch-art .fish-sprite{width:170px;height:170px}.detail-art .fish-sprite{width:148px;height:148px;margin:auto}
    .fish-crucian{--fish-x:0%;--fish-y:0%}.fish-chicken{--fish-x:25%;--fish-y:0%}.fish-toast{--fish-x:50%;--fish-y:0%}.fish-fries{--fish-x:75%;--fish-y:0%}.fish-strawberry{--fish-x:100%;--fish-y:0%}.fish-duck{--fish-x:0%;--fish-y:100%}.fish-cow{--fish-x:25%;--fish-y:100%}.fish-sleepcat{--fish-x:50%;--fish-y:100%}.fish-boba{--fish-x:75%;--fish-y:100%}.fish-cosmic{--fish-x:100%;--fish-y:100%}
    .bottom-nav{position:fixed;z-index:40;left:50%;bottom:0;width:min(100%,560px);transform:translateX(-50%);display:grid;grid-template-columns:repeat(3,1fr);padding:7px 8px max(7px,env(safe-area-inset-bottom));background:rgba(255,249,233,.96);border-top:2px solid rgba(121,94,58,.2);box-shadow:0 -5px 18px rgba(51,83,86,.12);backdrop-filter:blur(8px)}.nav-btn{position:relative;border:0;background:transparent;border-radius:14px;padding:5px 2px 3px;font-size:11px;font-weight:1000;color:#7b7569}.nav-btn .nav-icon{display:block;font-size:25px;line-height:26px}.nav-btn.active{background:#dff3e4;color:#3f785c}.nav-badge{position:absolute;top:1px;left:calc(50% + 11px);min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:#ef6457;color:white;border:2px solid #fff;font-size:10px;line-height:14px}.nav-badge[hidden]{display:none}
    .modal{position:fixed;z-index:100;inset:0;display:grid;place-items:center;padding:18px;background:rgba(35,61,69,.55);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .2s}.modal.show{opacity:1;pointer-events:auto}.catch-card,.detail-card{position:relative;width:min(100%,460px);max-height:92svh;overflow:auto;background:var(--paper);border:4px solid #e0bd7c;border-radius:28px;box-shadow:0 12px 0 rgba(55,58,50,.18),0 24px 70px rgba(21,45,51,.3);padding:17px;text-align:center;transform:translateY(30px) scale(.94);transition:transform .25s cubic-bezier(.2,.8,.2,1.15)}.modal.show .catch-card,.modal.show .detail-card{transform:none}.ribbon{display:inline-block;margin:-31px 0 5px;padding:9px 30px;background:#ef8d68;color:white;border-radius:8px;box-shadow:0 4px 0 #c2604f;font-size:20px;font-weight:1000}.catch-art{height:148px;display:grid;place-items:center;font-size:104px;animation:catchFloat 1.7s ease-in-out infinite alternate}.catch-art .combo{font-size:70px;white-space:nowrap}.catch-name{font-size:28px;font-weight:1000;margin:0}.rarity-chip{display:inline-block;border-radius:8px;background:var(--rarity);color:white;padding:4px 9px;margin:6px;font-size:12px;font-weight:1000;text-shadow:0 1px rgba(0,0,0,.18)}.stars{color:#e8a22e;letter-spacing:1px;font-size:18px}.weight{font-weight:900;color:#6f6557}.description{margin:12px 0;padding:12px;border:2px solid #e3d2ad;border-radius:14px;background:#fffdf6;text-align:left;line-height:1.55;font-size:14px;font-weight:700}.modal-actions{display:grid;grid-template-columns:1fr 1.35fr;gap:9px}.modal-actions button,.detail-close{border:0;border-radius:14px;padding:14px 8px;font-weight:1000;box-shadow:0 4px 0 #b8a069}.release{background:#75c5df;color:white;box-shadow:0 4px 0 #4299b8!important}.keep{background:#ffd16a}.keep:disabled{opacity:.45}.detail-close{width:100%;background:#ffd16a}.detail-art{font-size:88px;margin:7px}.detail-art .combo{font-size:60px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:12px 0}.stat{padding:8px 3px;border-radius:12px;background:#f3e6c8;font-size:11px;font-weight:800}.stat b{display:block;font-size:15px;margin-bottom:2px}
    .toast{position:fixed;z-index:150;left:50%;bottom:95px;max-width:calc(100% - 30px);transform:translate(-50%,30px);opacity:0;background:#354d55;color:white;padding:11px 17px;border-radius:999px;box-shadow:0 6px 20px rgba(30,49,55,.3);font-size:13px;font-weight:900;transition:.25s;pointer-events:none;white-space:nowrap}.toast.show{opacity:1;transform:translate(-50%,0)}
    .confetti{position:fixed;z-index:110;inset:0;pointer-events:none;overflow:hidden}.confetti i{position:absolute;top:-20px;width:9px;height:16px;border-radius:2px;animation:confetti 1.3s ease-in forwards}
    @keyframes drift{to{transform:translateX(36px)}}@keyframes water{to{transform:translateX(25px)}}@keyframes bob{50%{transform:translateY(6px) rotate(4deg)}}@keyframes sink{to{transform:translateY(8px) rotate(-7deg)}}@keyframes pop{60%{opacity:1;transform:scale(1.25)}100%{opacity:1;transform:scale(1)}}@keyframes pulse{to{transform:scale(1.08)}}@keyframes buttonPulse{to{filter:brightness(1.12);transform:scale(1.015)}}@keyframes meterMove{0%{left:4%}100%{left:96%}}@keyframes catchFloat{to{transform:translateY(-8px) rotate(3deg)}}@keyframes confetti{to{top:105%;transform:rotate(720deg)}}
    @media(min-width:700px){body{padding:20px}.app{min-height:calc(100svh - 40px);border-radius:30px}.screen,.content-screen{min-height:calc(100svh - 40px)}.world{height:calc(100svh - 112px)}.bottom-nav{bottom:20px;border-radius:0 0 28px 28px}.toast{bottom:115px}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand">千望的怪怪釣魚日<small>WEIRD POND CLUB</small></div>
    <div class="pill" aria-label="持有金幣"><span class="coin">●</span><span id="coinText">0</span></div>
    <button class="icon-btn" id="soundBtn" aria-label="切換音效">🔊</button>
  </header>
  <section class="screen active" id="fishScreen" aria-label="釣魚池">
    <div class="world">
      <div class="cloud"></div><div class="cloud c2"></div><div class="hills"></div><div class="pond"></div><div class="shore"></div><div class="lily"></div>
      <div class="spot-sign">小池塘</div>
      <div class="fisher" id="fisher" aria-hidden="true"><svg viewBox="0 0 180 230">
        <ellipse cx="81" cy="211" rx="65" ry="13" fill="#397f8c" opacity=".22"/><path d="M44 133 Q26 155 30 198 Q56 218 112 207 Q121 162 106 134Z" fill="#76966a" stroke="#574b3f" stroke-width="4"/>
        <ellipse cx="77" cy="116" rx="53" ry="50" fill="#fff7e8" stroke="#574b3f" stroke-width="4"/><path d="M38 82 L35 42 L62 64 M111 78 L121 41 L93 61" fill="#fff7e8" stroke="#574b3f" stroke-width="4" stroke-linejoin="round"/>
        <path d="M26 93 Q31 45 79 38 Q125 43 132 89 Q82 113 26 93Z" fill="#c99a5d" stroke="#574b3f" stroke-width="4"/><path d="M15 91 Q73 76 143 91 Q144 105 79 109 Q19 106 15 91Z" fill="#d9aa69" stroke="#574b3f" stroke-width="4"/>
        <path d="M33 72 Q55 35 92 41 Q118 47 128 82" fill="none" stroke="#eac486" stroke-width="5"/><circle cx="61" cy="116" r="5" fill="#574b3f"/><circle cx="99" cy="116" r="5" fill="#574b3f"/>
        <path d="M76 126 q5 5 10 0" fill="none" stroke="#b66f60" stroke-width="3" stroke-linecap="round"/><path d="M50 151 Q72 162 106 151" fill="none" stroke="#5f7658" stroke-width="5"/>
        <g class="arm"><ellipse cx="118" cy="151" rx="17" ry="27" fill="#fff7e8" stroke="#574b3f" stroke-width="4" transform="rotate(-28 118 151)"/><circle cx="131" cy="132" r="8" fill="#fff7e8" stroke="#574b3f" stroke-width="4"/></g>
        <path d="M37 177 q-29 1-25 38 h28" fill="#718d66" stroke="#574b3f" stroke-width="4"/><path d="M98 207 q24 5 33-11" fill="none" stroke="#574b3f" stroke-width="7" stroke-linecap="round"/>
      </svg></div>
      <div class="rod-line"><div class="rod"></div><div class="line"></div></div><div class="bobber hidden" id="bobber"></div><div class="bite-burst" id="biteBurst">！！</div>
      <div class="game-panel"><div class="status-row"><span class="status-dot" id="statusDot"></span><span class="status-text" id="statusText">池水靜悄悄，今天會遇見誰呢？</span><span class="streak" id="streakText"></span></div><div class="meter" aria-label="收竿時機指示"><div class="meter-zone"></div><div class="meter-mark" id="meterMark"></div></div><button class="cast-btn" id="castBtn">拋 竿</button><p class="hint">魚漂沉下去、按鈕變紅時，立刻收竿！</p></div>
    </div>
  </section>
  <section class="screen content-screen" id="bagScreen" aria-label="背包"><div class="page-title"><h1>🎒 怪怪背包</h1><span id="bagCount">0 / 30 格</span></div><div class="panel"><div class="inventory-tools"><button class="sell-btn" id="sellSelected" disabled>賣出選取</button><button class="sell-btn secondary" id="sellAll" disabled>全部賣出</button></div><div class="inventory-grid" id="inventoryGrid"></div></div></section>
  <section class="screen content-screen" id="dexScreen" aria-label="圖鑑"><div class="page-title"><h1>📖 怪怪圖鑑</h1><span id="dexCount">0 / 10</span></div><div class="panel"><div class="filter-row" id="filterRow"></div><div class="dex-grid" id="dexGrid"></div></div></section>
  <nav class="bottom-nav" aria-label="主要功能"><button class="nav-btn active" data-screen="fish"><span class="nav-icon">🎣</span>釣魚</button><button class="nav-btn" data-screen="bag"><span class="nav-icon">🎒</span>背包 <span class="nav-badge" id="bagBadge" hidden></span></button><button class="nav-btn" data-screen="dex"><span class="nav-icon">📖</span>圖鑑 <span class="nav-badge" id="dexBadge" hidden></span></button></nav>
</main>
<div class="modal" id="catchModal" role="dialog" aria-modal="true" aria-labelledby="catchName"><div class="catch-card"><div class="ribbon">你釣到了！</div><div class="catch-art" id="catchArt"></div><h2 class="catch-name" id="catchName"></h2><div><span class="rarity-chip" id="catchRarity"></span><span class="stars" id="catchStars"></span></div><div class="weight" id="catchWeight"></div><div class="description" id="catchDesc"></div><div class="modal-actions"><button class="release" id="releaseBtn">放生</button><button class="keep" id="keepBtn">放入背包</button></div></div></div>
<div class="modal" id="detailModal" role="dialog" aria-modal="true" aria-labelledby="detailName"><div class="detail-card"><div class="detail-art" id="detailArt"></div><h2 id="detailName"></h2><span class="rarity-chip" id="detailRarity"></span><div class="description" id="detailDesc"></div><div class="stats" id="detailStats"></div><button class="detail-close" id="detailClose">收進腦海裡</button></div></div>
<div class="confetti" id="confetti"></div><div class="toast" id="toast" role="status"></div>
<script>
(()=>{'use strict';
  const RARITIES={'普通':{color:'#79ad79',stars:1},'少見':{color:'#e5a73b',stars:2},'稀有':{color:'#7e69c6',stars:3},'史詩':{color:'#e864a0',stars:4},'傳說':{color:'#ef6665',stars:5},'詭異':{color:'#824bc2',stars:6}};
  const FISH=[

    {id:'chicken',name:'雞魚',emoji:'🐔🐟',rarity:'普通',chance:25,min:.7,max:2.8,price:24,desc:'身體是魚，心是雞，每天清晨浮出水面打鳴，因此漁民都不用買鬧鐘。'},
    {id:'toast',name:'吐司魟魚',emoji:'🍞〰️',rarity:'少見',chance:15,min:.5,max:3.2,price:42,desc:'曬過太陽會變得酥脆，但塗果醬前牠通常已經飛走了。'},
    {id:'fries',name:'薯條鰻',emoji:'🍟〰️',rarity:'少見',chance:12,min:.4,max:2.5,price:50,desc:'一緊張就會把自己打成死結，沾番茄醬才肯慢慢解開。'},
    {id:'strawberry',name:'草莓水母',emoji:'🍓🪼',rarity:'稀有',chance:7.5,min:.3,max:1.8,price:85,desc:'看起來酸酸甜甜，實際上只要被碰到，就會害你想起國中黑歷史。'},
    {id:'duck',name:'鴨章魚',emoji:'🦆🐙',rarity:'稀有',chance:5.5,min:.8,max:3.8,price:105,desc:'八隻腳都套著黃色蛙鞋，游得不快，但踢水聲非常有自信。'},
    {id:'cow',name:'牛河豚',emoji:'🐮🐡',rarity:'史詩',chance:3.4,min:1.2,max:5.6,price:185,desc:'生氣時會膨成一顆乳牛氣球，擠出來的不是牛奶，是滿腹牢騷。'},

    {id:'cosmic',name:'宇宙雞魚王',emoji:'👑🐔',rarity:'詭異',chance:.5,min:3.2,max:9.9,price:1250,desc:'來自咕咕座第三池塘，牠不是在游泳，只是宇宙剛好繞著牠旋轉。'}
  ];
  const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
  const els={coin:$('#coinText'),bagCount:$('#bagCount'),bagBadge:$('#bagBadge'),dexCount:$('#dexCount'),dexBadge:$('#dexBadge'),inventory:$('#inventoryGrid'),dex:$('#dexGrid'),filters:$('#filterRow'),sellSelected:$('#sellSelected'),sellAll:$('#sellAll'),cast:$('#castBtn'),status:$('#statusText'),dot:$('#statusDot'),meter:$('#meterMark'),bobber:$('#bobber'),fisher:$('#fisher'),burst:$('#biteBurst'),streak:$('#streakText'),catchModal:$('#catchModal'),detailModal:$('#detailModal'),toast:$('#toast'),sound:$('#soundBtn')};
  let data=load(),phase='idle',biteTimer=null,escapeTimer=null,pendingCatch=null,selected=new Set(),filter='全部',audioCtx=null,toastTimer=null;
  function fresh(){return{coins:120,bag:[],caught:{},newDex:[],streak:0,sound:true,total:0,bestWeight:{}}}
  function load(){try{const v=JSON.parse(localStorage.getItem('weirdPondSaveV1'));return Object.assign(fresh(),v,{bag:Array.isArray(v.bag)?v.bag:[]})}catch(e){return fresh()}}
  function save(){localStorage.setItem('weirdPondSaveV1',JSON.stringify(data))}
  function fmt(n){return Math.round(n).toLocaleString('zh-TW')}
  function fishBy(id){return FISH.find(f=>f.id===id)}
  function artHTML(f){return `<span class="fish-sprite fish-${f.id}" role="img" aria-label="${f.name}"></span>`}
  function beep(freq=440,duration=.08,type='sine',volume=.035){if(!data.sound)return;try{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(volume,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+duration);o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+duration)}catch(e){}}
  function vibrate(pattern){if(navigator.vibrate)navigator.vibrate(pattern)}
  function toast(msg){clearTimeout(toastTimer);els.toast.textContent=msg;els.toast.classList.add('show');toastTimer=setTimeout(()=>els.toast.classList.remove('show'),1900)}
  function renderHeader(){els.coin.textContent=fmt(data.coins);els.bagCount.textContent=`${data.bag.length} / 30 格`;els.bagBadge.hidden=!data.bag.length;els.bagBadge.textContent=data.bag.length;const unlocked=Object.keys(data.caught).length;els.dexCount.textContent=`${unlocked} / ${FISH.length}`;els.dexBadge.hidden=!data.newDex.length;els.dexBadge.textContent=data.newDex.length;els.sound.textContent=data.sound?'🔊':'🔇'}
  function switchScreen(name){if(name!=='fish'&&(phase==='waiting'||phase==='bite')){clearTimeout(biteTimer);clearTimeout(escapeTimer);setPhase('idle','魚先等等，我們回池塘再重新拋竿。')}$$('.screen').forEach(s=>s.classList.toggle('active',s.id===name+'Screen'));$$('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.screen===name));if(name==='bag')renderBag();if(name==='dex'){renderDex();data.newDex=[];save();renderHeader()}window.scrollTo(0,0)}
  function setPhase(next,msg){phase=next;els.status.textContent=msg;els.dot.className='status-dot'+(next==='bite'?' bite':'');els.cast.className='cast-btn'+(next==='bite'?' bite':'');els.meter.classList.toggle('moving',next==='waiting'||next==='bite');els.bobber.className='bobber '+(next==='idle'?'hidden':next==='bite'?'bite':'waiting');els.fisher.classList.toggle('cast',next!=='idle');els.cast.disabled=next==='waiting'||next==='result';els.cast.textContent=next==='idle'?'拋 竿':next==='waiting'?'噓……等待咬鉤':next==='bite'?'收 竿！':'整理魚線中';els.streak.textContent=data.streak>=2?`連續 ${data.streak} 次 ✦`:''}
  function startFishing(){if(phase!=='idle')return;if(data.bag.length>=30){toast('背包滿啦，先賣幾隻魚吧！');switchScreen('bag');return}beep(330,.09,'triangle');setPhase('waiting','魚漂晃呀晃……先別急著收竿');const delay=1400+Math.random()*2400;biteTimer=setTimeout(triggerBite,delay)}
  function triggerBite(){if(phase!=='waiting')return;setPhase('bite','咬鉤了！就是現在！');els.burst.classList.remove('show');void els.burst.offsetWidth;els.burst.classList.add('show');beep(760,.12,'square',.05);vibrate([45,30,70]);escapeTimer=setTimeout(missedBite,1250)}
  function missedBite(){if(phase!=='bite')return;data.streak=0;save();beep(150,.18,'sawtooth');setPhase('result','跑掉了！牠留下了一個很有態度的水花。');setTimeout(()=>setPhase('idle','池水恢復平靜，再試一次吧。'),1100)}
  function reel(){if(phase==='idle')return startFishing();if(phase!=='bite')return;clearTimeout(escapeTimer);const meterRect=els.meter.parentElement.getBoundingClientRect(),markRect=els.meter.getBoundingClientRect();const pos=(markRect.left+markRect.width/2-meterRect.left)/meterRect.width*100;const accuracy=Math.max(0,1-Math.abs(pos-50)/50);pendingCatch=makeCatch(accuracy);data.streak++;data.total++;const isNew=!data.caught[pendingCatch.id];data.caught[pendingCatch.id]=(data.caught[pendingCatch.id]||0)+1;data.bestWeight[pendingCatch.id]=Math.max(data.bestWeight[pendingCatch.id]||0,pendingCatch.weight);if(isNew)data.newDex.push(pendingCatch.id);save();setPhase('result',accuracy>.76?'完美收竿！魚線唱起了勝利之歌。':'拉上來了！差點就被牠笑著逃走。');beep(523,.1,'triangle',.05);setTimeout(()=>beep(784,.16,'triangle',.04),90);vibrate([35,35,80]);showCatch(pendingCatch,isNew)}
  function makeCatch(accuracy){const boosted=FISH.map(f=>({f,w:f.chance*Math.pow(1+(accuracy*.75),RARITIES[f.rarity].stars-1)}));let roll=Math.random()*boosted.reduce((s,x)=>s+x.w,0),chosen=boosted[0].f;for(const x of boosted){roll-=x.w;if(roll<=0){chosen=x.f;break}}const quality=.82+Math.random()*.36+accuracy*.12;const weight=+(chosen.min+(chosen.max-chosen.min)*Math.pow(Math.random(),1.45)*quality).toFixed(2);return{id:chosen.id,weight,uid:Date.now()+'_'+Math.random().toString(36).slice(2,7),caughtAt:Date.now()}}
  function showCatch(c,isNew){const f=fishBy(c.id),r=RARITIES[f.rarity];$('#catchArt').innerHTML=artHTML(f);$('#catchName').textContent=f.name;$('#catchRarity').textContent=f.rarity+(isNew?'・圖鑑新發現！':'');$('#catchRarity').style.setProperty('--rarity',r.color);$('#catchStars').textContent='★'.repeat(r.stars)+'☆'.repeat(6-r.stars);$('#catchWeight').textContent=`${c.weight.toFixed(2)} kg`;$('#catchDesc').textContent=f.desc;$('#keepBtn').disabled=data.bag.length>=30;$('#keepBtn').textContent=data.bag.length>=30?'背包已滿':'放入背包';els.catchModal.classList.add('show');if(isNew)confetti(r.color);renderHeader()}
  function closeCatch(keep){if(!pendingCatch)return;const f=fishBy(pendingCatch.id);if(keep&&data.bag.length<30){data.bag.push(pendingCatch);toast(`${f.name} 已在背包裡找好位置`);beep(620,.09,'triangle')}else{toast(`${f.name} 揮揮鰭，回家去了`)}pendingCatch=null;save();els.catchModal.classList.remove('show');renderHeader();setTimeout(()=>setPhase('idle','池塘裡還有更多怪東西在等你。'),260)}
  function sellValue(item){const f=fishBy(item.id);return Math.round(f.price*(.72+item.weight/f.max*.55))}
  function renderBag(){renderHeader();selected=new Set([...selected].filter(uid=>data.bag.some(x=>x.uid===uid)));els.inventory.innerHTML=data.bag.length?data.bag.map(item=>{const f=fishBy(item.id);return `<button class="item-card ${selected.has(item.uid)?'selected':''}" data-uid="${item.uid}" aria-pressed="${selected.has(item.uid)}"><span class="check">${selected.has(item.uid)?'✓':''}</span><span class="price-tag">◎ ${sellValue(item)}</span><span class="fish-emoji">${artHTML(f)}</span><span class="fish-name">${f.name}</span><span class="fish-meta">${item.weight.toFixed(2)} kg・${f.rarity}</span></button>`}).join(''):`<div class="empty-state"><b>🪣</b>背包空空，連水草都沒有。<br>去池塘交個新朋友吧！</div>`;const sum=data.bag.filter(x=>selected.has(x.uid)).reduce((s,x)=>s+sellValue(x),0);els.sellSelected.disabled=!selected.size;els.sellSelected.textContent=selected.size?`賣出 ${selected.size} 隻・◎ ${fmt(sum)}`:'賣出選取';els.sellAll.disabled=!data.bag.length}
  function sell(ids){const set=new Set(ids),sold=data.bag.filter(x=>set.has(x.uid));if(!sold.length)return;const earned=sold.reduce((s,x)=>s+sellValue(x),0);data.bag=data.bag.filter(x=>!set.has(x.uid));data.coins+=earned;selected.clear();save();beep(880,.08,'triangle');setTimeout(()=>beep(1100,.1,'triangle'),70);confetti('#ffd34f',12);toast(`成交！賺到 ${fmt(earned)} 枚金幣`);renderBag()}
  function renderFilters(){els.filters.innerHTML=['全部',...Object.keys(RARITIES)].map(x=>`<button class="filter-btn ${filter===x?'active':''}" data-filter="${x}">${x}</button>`).join('')}
  function renderDex(){renderHeader();renderFilters();const list=filter==='全部'?FISH:FISH.filter(f=>f.rarity===filter);els.dex.innerHTML=list.map(f=>{const unlocked=!!data.caught[f.id],r=RARITIES[f.rarity],isNew=data.newDex.includes(f.id);return `<button class="dex-card ${unlocked?'':'locked'}" data-fish="${f.id}" style="--rarity:${r.color}" ${unlocked?'':'disabled'}>${isNew?'<span class="new-badge">NEW</span>':''}<div class="rarity-line"></div><span class="fish-emoji">${artHTML(f)}</span><span class="fish-name">${unlocked?f.name:'???'}</span><span class="fish-meta">${unlocked?`${f.rarity}・釣過 ${data.caught[f.id]} 隻`:'尚未相遇'}</span></button>`}).join('')}
  function showDetail(id){const f=fishBy(id),r=RARITIES[f.rarity];$('#detailArt').innerHTML=artHTML(f);$('#detailName').textContent=f.name;$('#detailRarity').textContent=f.rarity+'・'+'★'.repeat(r.stars);$('#detailRarity').style.setProperty('--rarity',r.color);$('#detailDesc').textContent=f.desc;$('#detailStats').innerHTML=`<div class="stat"><b>${data.caught[id]||0}</b>釣獲次數</div><div class="stat"><b>${(data.bestWeight[id]||0).toFixed(2)} kg</b>最大紀錄</div><div class="stat"><b>◎ ${f.price} 起</b>基礎價值</div>`;els.detailModal.classList.add('show')}
  function confetti(color,count=24){const root=$('#confetti');root.innerHTML='';for(let i=0;i<count;i++){const p=document.createElement('i');p.style.left=Math.random()*100+'%';p.style.background=i%3?color:'#fff2a5';p.style.animationDelay=Math.random()*.3+'s';p.style.transform=`rotate(${Math.random()*180}deg)`;root.appendChild(p)}setTimeout(()=>root.innerHTML='',1700)}
  els.cast.addEventListener('click',()=>phase==='bite'?reel():startFishing());$('#releaseBtn').addEventListener('click',()=>closeCatch(false));$('#keepBtn').addEventListener('click',()=>closeCatch(true));
  $$('.nav-btn').forEach(b=>b.addEventListener('click',()=>switchScreen(b.dataset.screen)));els.inventory.addEventListener('click',e=>{const card=e.target.closest('[data-uid]');if(!card)return;selected.has(card.dataset.uid)?selected.delete(card.dataset.uid):selected.add(card.dataset.uid);renderBag()});
  els.sellSelected.addEventListener('click',()=>sell([...selected]));els.sellAll.addEventListener('click',()=>sell(data.bag.map(x=>x.uid)));els.filters.addEventListener('click',e=>{const b=e.target.closest('[data-filter]');if(!b)return;filter=b.dataset.filter;renderDex()});
